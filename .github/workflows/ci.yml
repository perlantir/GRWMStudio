name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Select Xcode
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
      - name: Select simulator
        id: simulator
        run: |
          set -euo pipefail
          xcrun simctl list devices available
          SIMULATOR_NAME="$(
            xcrun simctl list devices available |
              awk -F '[()]' '/iPhone/ { gsub(/^[ \t]+|[ \t]+$/, "", $1); print $1; exit }'
          )"
          if [ -z "$SIMULATOR_NAME" ]; then
            echo "No available iPhone simulator found."
            exit 1
          fi
          echo "name=$SIMULATOR_NAME" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $SIMULATOR_NAME"
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: ./Scripts/lint.sh
      - name: Check localization
        run: ./Scripts/check-localization.sh
      - name: Verify DeepAR isolation
        run: ./Scripts/verify-deepar-isolation.sh
      - name: Build & Test
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme GRWMStudio \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }},OS=latest" \
            -resultBundlePath TestResults.xcresult \
            | xcbeautify
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
