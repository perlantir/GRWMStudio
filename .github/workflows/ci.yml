name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Select Xcode
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
      - name: Select simulator
        id: simulator
        run: |
          set -euo pipefail
          xcrun simctl list devices available
          SIMULATOR_NAME="$(
            xcrun simctl list devices available |
              awk -F '[()]' '/iPhone/ { gsub(/^[ \t]+|[ \t]+$/, "", $1); print $1; exit }'
          )"
          if [ -z "$SIMULATOR_NAME" ]; then
            echo "No available iPhone simulator found."
            exit 1
          fi
          echo "name=$SIMULATOR_NAME" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $SIMULATOR_NAME"
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Create local secrets config
        env:
          DEEPAR_LICENSE_KEY: ${{ secrets.DEEPAR_LICENSE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p Config
          printf "DEEPAR_LICENSE_KEY = %s\n" "${DEEPAR_LICENSE_KEY:-CI_PLACEHOLDER}" > Config/Secrets.xcconfig
      - name: Lint
        run: ./Scripts/lint.sh
      - name: Check localization
        run: ./Scripts/check-localization.sh
      - name: Verify DeepAR isolation
        run: ./Scripts/verify-deepar-isolation.sh
      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme GRWMStudio \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }},OS=latest" \
            2>&1 | tee xcodebuild-build.log | xcbeautify
      - name: Unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme GRWMStudio \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }},OS=latest" \
            -only-testing:GRWMStudioTests \
            -enableCodeCoverage YES \
            -resultBundlePath UnitTestResults.xcresult \
            2>&1 | tee xcodebuild-unit.log | xcbeautify
      - name: UI smoke tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme GRWMStudio \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }},OS=latest" \
            -only-testing:GRWMStudioUITests/GRWMStudioUITests/testLaunches \
            -only-testing:GRWMStudioUITests/AccessibilityUITests/testKeyControlsMeetMinimum44PointHitTargets \
            -resultBundlePath UISmokeTestResults.xcresult \
            2>&1 | tee xcodebuild-ui-smoke.log | xcbeautify
      - name: Upload xcodebuild logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: xcodebuild-*.log
      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: UnitTestResults.xcresult
      - name: Upload UI smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-test-results
          path: UISmokeTestResults.xcresult
