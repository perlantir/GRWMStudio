            destination: resources
            subpath: Effects/textures
      - path: GRWMStudio/Resources/Effects/textures/eyeliner_winged.png
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Effects/textures
      - path: GRWMStudio/Resources/Effects/textures/eyeliner_double_flick.png
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Effects/textures
      - path: GRWMStudio/Resources/Effects/textures/eyelashes_none.png
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Effects/textures
      - path: GRWMStudio/Resources/Effects/textures/eyelashes_natural.png
        buildPhase:
          copyFiles:
