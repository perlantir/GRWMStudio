      - path: GRWMStudio/Resources/Effects/thumbnails/noFilter.png
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Effects/thumbnails
      - path: GRWMStudio/Resources/Effects/thumbnails/shadow.png
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Effects/thumbnails
    dependencies:
      - package: DeepAR
    info:
      path: GRWMStudio/Resources/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        DEEPAR_LICENSE_KEY: $(DEEPAR_LICENSE_KEY)
        UILaunchStoryboardName: LaunchScreen
        UIRequiresFullScreen: true
        UIAppFonts:
          - Fredoka-Regular.ttf
          - Fredoka-Medium.ttf
          - Fredoka-SemiBold.ttf
          - Fredoka-Bold.ttf
          - Quicksand-Regular.ttf
          - Quicksand-Medium.ttf
          - Quicksand-SemiBold.ttf
          - Quicksand-Bold.ttf
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Light
        NSCameraUsageDescription: GRWM Studio uses your camera to show you the magic mirror.
        NSMicrophoneUsageDescription: GRWM Studio records sound when you make a video so you can talk and sing along!
        NSPhotoLibraryAddUsageDescription: GRWM Studio adds saved looks to Photos only when you tap Save.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.grwmstudio.ios
        PRODUCT_NAME: GRWMStudio
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTED_INTERFACE_ORIENTATIONS: UIInterfaceOrientationPortrait
        INFOPLIST_FILE: GRWMStudio/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFiles:
          - ${SRCROOT}/.swiftlint.yml
        script: |
          if which swiftlint > /dev/null; then
            swiftlint --strict --config "${SRCROOT}/.swiftlint.yml"
          else
            echo "warning: SwiftLint not installed. brew install swiftlint"
          fi
  GRWMStudioTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GRWMStudioTests
        excludes:
          - "**/.gitkeep"
    dependencies:
      - target: GRWMStudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.grwmstudio.ios.tests
        PRODUCT_NAME: GRWMStudioTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/GRWMStudio.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/GRWMStudio"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TARGETED_DEVICE_FAMILY: "1"
  GRWMStudioUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GRWMStudioUITests
        excludes:
          - "**/.gitkeep"
    dependencies:
      - target: GRWMStudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.grwmstudio.ios.uitests
        PRODUCT_NAME: GRWMStudioUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: GRWMStudio
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  GRWMStudio:
    build:
      targets:
        GRWMStudio: all
        GRWMStudioTests: [test]
        GRWMStudioUITests: [test]
    test:
      targets:
        - GRWMStudioTests
        - GRWMStudioUITests
