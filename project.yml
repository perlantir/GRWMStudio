name: GRWMStudio
options:
  bundleIdPrefix: app.grwmstudio
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig
settings:
  base:
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    DEVELOPMENT_TEAM: 84D222Q647
    ENABLE_BITCODE: NO
    EXCLUDED_ARCHS[sdk=iphonesimulator*]: arm64
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SDKROOT: iphoneos
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
packages:
  DeepAR:
    url: https://github.com/DeepARSDK/swift-deepar
    from: 5.6.22
targets:
  GRWMStudio:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GRWMStudio
        excludes:
          - "**/.gitkeep"
          - "Resources/Info.plist"
          - "Resources/Effects/**"
          - "Resources/Effects/_source/**"
      - path: GRWMStudio/Resources/Effects/baseBeauty.deepar
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Effects
      - path: GRWMStudio/Resources/Effects/look_legacy01.deepar
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Effects
      - path: GRWMStudio/Resources/Effects/look_legacy02.deepar
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Effects
      - path: GRWMStudio/Resources/Effects/manifest.json
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Effects
      - path: GRWMStudio/Resources/Effects/luts/lut_soft.png
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Effects/luts
      - path: GRWMStudio/Resources/Effects/luts/lut_glow.png
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Effects/luts
      - path: GRWMStudio/Resources/Effects/luts/lut_glam.png
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Effects/luts
      - path: GRWMStudio/Resources/Effects/textures/eyeshadow_basic.png
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Effects/textures
      - path: GRWMStudio/Resources/Effects/textures/eyeshadow_smokey.png
