      - path: GRWMStudio/Resources/Effects/thumbnails/baseBeauty.png
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Effects/thumbnails
      - path: GRWMStudio/Resources/Effects/thumbnails/brows.png
        buildPhase:
          copyFiles:
