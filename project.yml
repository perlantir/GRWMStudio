      - path: GRWMStudio/Resources/Effects/textures/eyelashes_drama.png
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Effects/textures
      - path: GRWMStudio/Resources/Effects/textures/brows_natural.png
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Effects/textures
      - path: GRWMStudio/Resources/Effects/textures/blush_mask.png
        buildPhase:
          copyFiles:
            destination: resources
